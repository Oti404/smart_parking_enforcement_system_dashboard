<div class="flex h-screen w-full bg-[#0b1120] overflow-hidden">
  
  <aside class="w-[260px] bg-enforce-bg border-r border-slate-800/60 flex flex-col justify-between flex-shrink-0">
    
    <div>
      <div class="p-6 border-b border-slate-800/60 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-slate-300 font-bold overflow-hidden">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div>
          <h3 class="text-slate-100 text-sm font-semibold tracking-wide">Officer John Doe</h3>
          <p class="text-slate-500 text-xs">Unit 42</p>
        </div>
      </div>

      <nav class="p-4 space-y-1.5">
        
        <a routerLink="/dashboard" routerLinkActive="bg-enforce-blue/10 text-enforce-blue border-enforce-blue" [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-400 font-medium text-sm hover:text-slate-200 hover:bg-slate-800/50 transition-colors border border-transparent cursor-pointer">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Dashboard
        </a>

        <a routerLink="/pending-tickets" routerLinkActive="bg-enforce-blue text-white shadow-lg shadow-blue-500/20"
           class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-400 font-medium text-sm hover:text-slate-200 hover:bg-slate-800/50 transition-colors border border-transparent cursor-pointer">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
          Pending Tickets
        </a>

        <a routerLink="/history" routerLinkActive="bg-enforce-blue/10 text-enforce-blue border-enforce-blue"
           class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-400 font-medium text-sm hover:text-slate-200 hover:bg-slate-800/50 transition-colors border border-transparent cursor-pointer">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          History
        </a>
        
        <a routerLink="/settings" routerLinkActive="bg-enforce-blue/10 text-enforce-blue border-enforce-blue"
           class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-400 font-medium text-sm hover:text-slate-200 hover:bg-slate-800/50 transition-colors border border-transparent cursor-pointer">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>

      </nav>
    </div>

    <div class="p-4 border-t border-slate-800/60">
      <button (click)="onLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-slate-400 font-medium text-sm hover:text-white hover:bg-slate-800 transition-colors border border-slate-700/50">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </button>
    </div>

  </aside>

  <main class="flex-1 relative overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

</div>
