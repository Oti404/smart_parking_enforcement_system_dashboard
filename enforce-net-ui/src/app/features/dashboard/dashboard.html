<div class="p-8 space-y-8 bg-[#0b1120] min-h-full text-slate-200">
  
  <header>
    <h1 class="text-2xl font-bold text-white tracking-tight">Admin Analytics Overview</h1>
    <p class="text-slate-400 text-sm">Real-time enforcement metrics and system diagnostics.</p>
  </header>

  @if (stats()) {
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <div class="bg-enforce-card border border-slate-800 p-6 rounded-2xl flex justify-between items-start">
        <div>
          <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Total Tickets Issued</p>
          <div class="flex items-baseline gap-2">
            <span class="text-4xl font-bold text-white">{{ stats().totalTickets | number }}</span>
            <span class="text-enforce-green text-xs font-bold">+12%</span>
          </div>
        </div>
        <div class="p-3 bg-blue-500/10 rounded-xl text-enforce-blue border border-blue-500/20">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
      </div>

      <div class="bg-enforce-card border border-slate-800 p-6 rounded-2xl">
        <div class="flex justify-between items-start mb-4">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">OCR Accuracy</p>
        </div>
        <div class="flex items-baseline gap-2 mb-4">
          <span class="text-4xl font-bold text-white">{{ stats().ocrAccuracy }}%</span>
        </div>
        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
          <div class="bg-enforce-green h-full shadow-[0_0_8px_rgba(34,197,94,0.5)]" 
               [style.width.%]="stats().ocrAccuracy"></div>
        </div>
      </div>

      <div class="bg-enforce-card border border-slate-800 p-6 rounded-2xl flex justify-between items-start">
        <div>
          <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Active Patrol Units</p>
          <div class="flex items-baseline gap-2">
            <span class="text-4xl font-bold text-white">{{ stats().activeUnits }}</span>
            <span class="text-slate-500 text-sm font-medium">/ 30</span>
          </div>
        </div>
      </div>

    </div>
  } @else {
    <div class="flex justify-center p-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-enforce-blue"></div>
    </div>
  }
</div>
