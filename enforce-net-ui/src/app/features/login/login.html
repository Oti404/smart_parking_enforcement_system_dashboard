<div class="min-h-screen flex items-center justify-center bg-enforce-bg relative overflow-hidden" 
     style="background-image: url('https://snazzy-maps-cdn.azureedge.net/assets/74-micro.png?v=20170626083204'); background-size: cover; background-position: center;">
  
  <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>

  <div class="relative z-10 w-full max-w-[420px] bg-[#1a2235] rounded-xl shadow-2xl border border-slate-700/50 overflow-hidden">
    
    <div class="flex flex-col items-center pt-10 pb-6 border-b border-slate-700/50 px-8">
      <div class="w-14 h-14 bg-blue-500/10 rounded-full flex items-center justify-center mb-4 border border-blue-500/20 shadow-[0_0_15px_rgba(37,99,235,0.2)]">
        <svg class="w-6 h-6 text-enforce-blue" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path fill="#fff" d="M11 7h2v5h-2zm0 6h2v2h-2z"/>
        </svg>
      </div>
      
      <h1 class="text-xl font-bold text-white tracking-widest mb-1">SECURE LOGIN PORTAL</h1>
      <p class="text-[10px] font-semibold text-enforce-blue tracking-widest uppercase">Department of Parking Enforcement</p>
    </div>

    <div class="p-8 space-y-5">
      
      <div class="space-y-1.5">
        <label class="text-[11px] font-semibold text-slate-400 tracking-wider">BADGE ID / USERNAME</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
            </svg>
          </div>
          <input type="text" placeholder="Enter Badge ID" 
                 class="w-full bg-[#0f172a] text-slate-200 border border-slate-700 rounded-md py-2.5 pl-10 pr-3 text-sm focus:outline-none focus:border-enforce-blue focus:ring-1 focus:ring-enforce-blue transition-colors placeholder-slate-600">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[11px] font-semibold text-slate-400 tracking-wider">ENCRYPTED PASSWORD</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
          <input type="password" placeholder="••••••••" 
                 class="w-full bg-[#0f172a] text-slate-200 border border-slate-700 rounded-md py-2.5 pl-10 pr-3 text-sm focus:outline-none focus:border-enforce-blue focus:ring-1 focus:ring-enforce-blue transition-colors placeholder-slate-600">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button class="flex-none p-2.5 bg-[#0f172a] border border-slate-700 rounded-md hover:bg-slate-800 transition-colors group">
          <svg class="w-5 h-5 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
          </svg>
        </button>
        
        <button (click)="onLogin()" 
                class="flex-1 bg-enforce-blue hover:bg-blue-500 text-white font-semibold text-sm py-2.5 px-4 rounded-md shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
          AUTHENTICATE
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>

    </div>

    <div class="bg-[#0f172a]/80 py-4 px-6 border-t border-slate-800 text-center flex flex-col items-center justify-center">
      <div class="flex items-center gap-1.5 mb-1">
        <svg class="w-3.5 h-3.5 text-enforce-red" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span class="text-[10px] font-bold text-enforce-red tracking-widest uppercase">System Authority Warning</span>
      </div>
      <p class="text-[8px] text-slate-500 uppercase tracking-wider">Unauthorized access is strictly prohibited and logged.</p>
    </div>

  </div>
</div>
